name: Release

# Push a tag like `v0.2.0` to build, sign, notarize, publish the DMG to a
# GitHub Release, and bump the Homebrew cask in the tap.
#
# Required repository secrets:
#   MACOS_CERT_P12_BASE64  base64 of the "Developer ID Application" cert (.p12)
#   MACOS_CERT_PASSWORD    password for that .p12
#   APPLE_SIGN_IDENTITY    e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_TEAM_ID          your Apple Developer team id
#   APPLE_ID               Apple account email used for notarization
#   APPLE_APP_PASSWORD     app-specific password for notarytool
#   HOMEBREW_TAP_TOKEN     PAT with write access to ViniAguiar1/homebrew-termai
# Manual trigger for now (releases are cut locally with a Developer ID until
# the Apple secrets below are configured). Once they are, switch this back to:
#   on:
#     push:
#       tags: ["v*"]
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the leading v (e.g. 0.2.0)"
        required: true

permissions:
  contents: write # create releases / upload assets

jobs:
  release:
    name: Build, sign, notarize, publish
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        run: echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ai/go.mod
          cache-dependency-path: ai/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PW="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PW" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "notarytool" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Build, sign, notarize, package DMG
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash packaging/macos/package.sh "${{ steps.ver.outputs.version }}"

      - name: Compute DMG sha256
        id: sha
        run: |
          DMG="dist/termAI-${{ steps.ver.outputs.version }}-macos-arm64.dmg"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$DMG" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" "${{ steps.sha.outputs.dmg }}" \
            --title "termAI v${{ steps.ver.outputs.version }}" \
            --target "$GITHUB_SHA" \
            --generate-notes

      - name: Bump Homebrew cask in tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/ViniAguiar1/homebrew-termai.git" tap
          mkdir -p tap/Casks
          # Start from the in-repo cask, then stamp version + real sha256.
          sed -e "s/^  version \".*\"/  version \"${VERSION}\"/" \
              -e "s/^  sha256 .*/  sha256 \"${SHA256}\"/" \
              packaging/homebrew/termai.rb > tap/Casks/termai.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/termai.rb
          git commit -m "termai ${VERSION}"
          git push
