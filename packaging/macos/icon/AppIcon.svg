<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark terminal body (brand: near-black) -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1d20"/>
      <stop offset="0.55" stop-color="#101113"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Magenta brand accent -->
    <linearGradient id="mag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d56bff"/>
      <stop offset="1" stop-color="#b23dff"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- macOS squircle (824 centered, r≈185) -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="none" stroke="#2c2f34" stroke-width="3"/>
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#gloss)"/>

  <!-- Terminal prompt chevron -->
  <path d="M372 392 L500 512 L372 632" fill="none" stroke="#f0f0f0"
        stroke-width="58" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI sparkles (brand magenta): a large one + a small one -->
  <g filter="url(#glow)" fill="url(#mag)">
    <path transform="translate(556,392) scale(1.55)"
          d="M50,0 C54,28 72,46 100,50 C72,54 54,72 50,100 C46,72 28,54 0,50 C28,46 46,28 50,0 Z"/>
    <path transform="translate(648,560) scale(0.7)"
          d="M50,0 C54,28 72,46 100,50 C72,54 54,72 50,100 C46,72 28,54 0,50 C28,46 46,28 50,0 Z"/>
  </g>
</svg>
